specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Workday Tracking System
providerId: workday-tracking-system
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Time Tracking
  - Workforce Management
  - Workday
description: Workday does not publish a unified public rate-limit policy for the Time Tracking,
  Absence, or Scheduling APIs. Throttling is tenant-scoped and documented inside the gated
  Workday Community reference.
sources:
  - https://community.workday.com/api
  - https://docs.workday.com/api/time-tracking
responseCodes:
  serviceUnavailable: 503
limits:
  - name: Tenant-scoped throttling (see gated Workday Community documentation)
    scope: tenant
    metric: varies
    limit: see https://community.workday.com/api
    notes: Workday enforces tenant-level throttling and per-integration concurrency caps for time-
      tracking and scheduling endpoints; specific values are not publicly published.
policies:
  - name: Documentation gating
    description: Workday rate-limit policy is published only on community.workday.com, which
      requires a customer login. No public per-second or per-minute numbers are available.
  - name: Backoff
    description: Standard guidance is exponential backoff with jitter on HTTP 503 and documented
      Workday SOAP throttling faults.
  - name: Batch operations
    description: Time-block and clock-event endpoints expose batch variants; using them is the
      primary mitigation for tenant-level throttling.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
