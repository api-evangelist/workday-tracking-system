meters:
  - name: tenant_subscription
    unit: month
    aggregation: sum
    dimensions:
      - tenant
principles:
  - name: Visibility
    description: No public usage API. Customers see time-tracking integration volume through the
      Workday Integration Cloud monitor inside the tenant.
  - name: Allocation
    description: Costs allocate by Workday tenant and HCM/Time Tracking subscription line; per-
      integration attribution depends on internal Workday telemetry rather than a billing export.
  - name: Optimization
    description: Levers are integration-design choices (batch time-block submission, scheduled
      pulls vs. event-driven webhooks where available, ISU reuse).
  - name: Accountability
    description: Workday subscription is owned by HR / Workforce procurement; Time Tracking
      integration design and run-time costs are owned by the integration engineering team.
