description: FinOps shape for the Workday Tracking System is opaque. API consumption is bundled
  with a negotiated Workday tenant subscription; there is no per-request meter, FOCUS-aligned
  cost export, or public usage-billing API.
sources:
  - https://www.workday.com/en-us/products/human-capital-management/time-tracking.html
  - https://community.workday.com/api
notes: Workday does not expose a FOCUS-aligned cost export for time-tracking integrations. Meters
  and charge categories cannot be reconciled without authenticated access to the customer's
  Workday Community documentation and contract.
