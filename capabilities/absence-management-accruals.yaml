naftiko: 1.0.0-alpha2
info:
  label: Workday Absence Management API — Accruals
  description: 'Workday Absence Management API — Accruals. 2 operations. Lead operation: List Accrual Overrides. Self-contained
    Naftiko capability covering one Workday Tracking System business surface.'
  tags:
  - Workday Tracking System
  - Accruals
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_TRACKING_SYSTEM_API_KEY: WORKDAY_TRACKING_SYSTEM_API_KEY
capability:
  consumes:
  - type: http
    namespace: absence-management-accruals
    baseUri: https://{tenant}.workday.com/api/absence-management/v1
    description: Workday Absence Management API — Accruals business capability. Self-contained, no shared references.
    resources:
    - name: workers-workerId-accrualOverrides
      path: /workers/{workerId}/accrualOverrides
      operations:
      - name: listaccrualoverrides
        method: GET
        description: List Accrual Overrides
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workerId
          in: path
          type: string
          description: The Workday ID of the worker
          required: true
      - name: createaccrualoverride
        method: POST
        description: Create Accrual Override
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workerId
          in: path
          type: string
          description: The Workday ID of the worker
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WORKDAY_TRACKING_SYSTEM_API_KEY}}'
  exposes:
  - type: rest
    namespace: absence-management-accruals-rest
    port: 8080
    description: REST adapter for Workday Absence Management API — Accruals. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/workers/{workerid}/accrualoverrides
      name: workers-workerid-accrualoverrides
      description: REST surface for workers-workerId-accrualOverrides.
      operations:
      - method: GET
        name: listaccrualoverrides
        description: List Accrual Overrides
        call: absence-management-accruals.listaccrualoverrides
        with:
          workerId: rest.workerId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createaccrualoverride
        description: Create Accrual Override
        call: absence-management-accruals.createaccrualoverride
        with:
          workerId: rest.workerId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: absence-management-accruals-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Absence Management API — Accruals. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-accrual-overrides
      description: List Accrual Overrides
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: absence-management-accruals.listaccrualoverrides
      with:
        workerId: tools.workerId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-accrual-override
      description: Create Accrual Override
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: absence-management-accruals.createaccrualoverride
      with:
        workerId: tools.workerId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
