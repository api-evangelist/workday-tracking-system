    baseUri: https://{tenant}.workday.com/api/time-tracking/v1
    description: Workday Time Tracking API — Time Blocks business capability. Self-contained, no shared references.
    resources:
    - name: workers-workerId-timeBlocks
      path: /workers/{workerId}/timeBlocks
      operations:
      - name: listtimeblocks
        method: GET
        description: List Time Blocks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workerId
          in: path
          type: string
          description: The Workday ID of the worker
          required: true
        - name: startDate
          in: query
          type: string
          description: Start date for time block retrieval (YYYY-MM-DD)
        - name: endDate
          in: query
          type: string
          description: End date for time block retrieval (YYYY-MM-DD)
        - name: status
          in: query
          type: string
          description: Filter by time block status
        - name: limit
          in: query
          type: integer
          description: Maximum number of records to return
        - name: offset
          in: query
          type: integer
          description: Offset for pagination
      - name: createtimeblock
        method: POST
        description: Create Time Block
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workerId
          in: path
          type: string
          description: The Workday ID of the worker
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: workers-workerId-timeBlocks-timeBlockId
      path: /workers/{workerId}/timeBlocks/{timeBlockId}
      operations:
      - name: gettimeblock
        method: GET
        description: Get Time Block
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workerId
          in: path
          type: string
          description: The Workday ID of the worker
          required: true
        - name: timeBlockId
          in: path
          type: string
          description: The Workday ID of the time block
          required: true
      - name: updatetimeblock
        method: PUT
        description: Update Time Block
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workerId
          in: path
          type: string
          description: The Workday ID of the worker
          required: true
        - name: timeBlockId
          in: path
          type: string
          description: The Workday ID of the time block
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletetimeblock
        method: DELETE
        description: Delete Time Block
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workerId
          in: path
          type: string
          description: The Workday ID of the worker
          required: true
        - name: timeBlockId
          in: path
          type: string
          description: The Workday ID of the time block
          required: true
    authentication:
