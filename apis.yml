  - type: Features
    data:
      - name: Time Block Management
        description: >-
          Capture, calculate, and report worker time blocks with batch
          import support for high-volume time entry workflows.
      - name: Time Clock Integration
        description: >-
          Import time clock events from third-party clocks and devices into
          Workday for centralized time tracking.
      - name: Timesheet Lifecycle
        description: >-
          Retrieve, submit, approve, and report on timesheets covering
          configurable pay periods.
      - name: Time Off and Leave
        description: >-
          Enter time off entries, request leaves of absence, and process
          return-from-leave events through the Absence Management API.
      - name: Accrual Balances and Overrides
        description: >-
          Inspect time off balances and apply accrual overrides to align
          worker plan balances with payroll requirements.
      - name: Schedule Shift Management
        description: >-
          Create, update, and import schedule shifts and assign them to
          workers within scheduling organizations.
      - name: Labor Demand Planning
        description: >-
          Configure labor demand by scheduling organization to drive
          shift creation and workforce planning.
      - name: Worker Scheduling Preferences
        description: >-
          Capture worker availability and scheduling preferences to
          inform shift assignment decisions.
  - type: UseCases
    data:
      - name: Payroll Time Capture
        description: >-
          Aggregate calculated time blocks and approved timesheets to feed
          downstream payroll runs.
      - name: Time Clock Device Integration
        description: >-
          Push punch-in and punch-out events from physical or mobile time
          clocks into Workday in near real time.
      - name: Absence and Leave Tracking
        description: >-
          Manage employee time off requests and leave of absence cases
          across HR, payroll, and benefits.
      - name: Workforce Scheduling
        description: >-
          Plan and publish weekly shift schedules across scheduling
          organizations based on labor demand.
      - name: Compliance Reporting
        description: >-
          Produce auditable records of worked hours, breaks, and leaves
          for labor law and contractual compliance.
      - name: Accrual Adjustment Workflows
        description: >-
          Apply targeted accrual overrides to correct worker balances
          following payroll or eligibility changes.
  - type: Integrations
    data:
      - name: Workday Payroll
        description: >-
          Calculated time blocks and approved timesheets feed Workday
          Payroll for gross-to-net processing.
      - name: Workday HCM
        description: >-
          Worker, organization, and position data from Workday HCM are
          referenced across time, absence, and scheduling APIs.
      - name: Time Clock Hardware
        description: >-
          Third-party time clock vendors integrate with the Time Tracking
          API via the time clock events endpoints.
      - name: Workforce Management Partners
        description: >-
          Scheduling and labor optimization partners exchange shifts,
          labor demand, and preferences with the Scheduling API.
      - name: Identity Providers
        description: >-
          OAuth 2.0 integration with enterprise identity providers
          authenticates API clients and workers.
  - type: Solutions
    data:
      - name: Workday Human Capital Management
        description: >-
          Core HCM suite that includes Time Tracking, Absence Management,
          and Scheduling as integrated workforce capabilities.
      - name: Workday Payroll
        description: >-
