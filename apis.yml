aid: workday-tracking-system
name: Workday Tracking System
description: >-
  APIs for managing employee time tracking, absence management, and workforce
  scheduling in the Workday platform. Covers time blocks, time clock events,
  timesheets, time off, leaves of absence, accruals, schedule shifts, scheduling
  organizations, labor demand, and worker scheduling preferences.
